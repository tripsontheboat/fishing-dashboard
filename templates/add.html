{% extends "base.html" %}
{% block content %}

<h1>Add New Observation</h1>

<div class="form-card">
    <form method="POST" enctype="multipart/form-data">

        <!-- Row 1 -->
        <div class="form-row">
            <label>Date:</label>
            <input type="date" name="date" required>
        </div>

        <div class="form-row">
            <label>Location:</label>
            <input type="text" name="location" placeholder="Where did you fish?" required>
        </div>

        <!-- Row 2 -->
        <div class="form-row">
            <label>Species:</label>
            <input type="text" name="species" placeholder="Species caught" required>
        </div>

        <div class="form-row">
            <label>Count:</label>
            <input type="number" name="count" min="0" placeholder="How many?" required>
        </div>

        <!-- Row 3 -->
        <div class="form-row">
            <label>Bait:</label>
            <input type="text" name="bait" placeholder="Bait used">
        </div>

        <div class="form-row">
            <label>Size:</label>
            <input type="text" name="size" placeholder="Size (optional)">
        </div>

        <!-- Row 4 -->
        <div class="form-row">
            <label>Water Type:</label>
            <select name="water">
                <option value="">Select</option>
                <option value="Fresh">Fresh</option>
                <option value="Salt">Salt</option>
                <option value="Ice">Ice</option>
                <option value="Brackish">Brackish</option>
            </select>
        </div>

        <div class="form-row">
            <label>Platform:</label>
            <select name="platform">
                <option value="">Select</option>
                <option value="Boat">Boat</option>
                <option value="Kayak">Kayak</option>
                <option value="Pier">Pier</option>
                <option value="Shore">Shore</option>
            </select>
        </div>

        <!-- Row 5 -->
        <div class="form-row">
            <label>Water Temp (°F):</label>
            <input type="number" name="water_temp" step="0.1" placeholder="Optional">
        </div>

        <div class="form-row">
            <label>Wind:</label>
            <input type="text" name="wind" placeholder="Wind conditions">
        </div>

        <!-- Row 6 -->
        <div class="form-row">
            <label>Wave Height:</label>
            <input type="text" name="wave_height" placeholder="Wave height">
        </div>

        <div class="form-row">
            <label>Image:</label>
            <input type="file" name="image" accept="image/*">
        </div>

        <!-- Row 7 -->
        <div class="form-row">
            <label>Latitude:</label>
            <input type="text" name="lat" placeholder="Optional">
        </div>

        <div class="form-row">
            <label>Longitude:</label>
            <input type="text" name="lng" placeholder="Optional">
        </div>

        <div class="form-row">
            <label>Angler:</label>
            <input type="text" name="angler" placeholder="Who caught the fish?" required>
        </div>

        <!-- Comments -->
        <div class="form-row" style="grid-column: 1 / -1;">
            <label>Comments:</label>
            <textarea name="comments" rows="3" placeholder="Additional notes..."></textarea>
        </div>

        <!-- YouTube Link -->
        <div class="form-row" style="grid-column: 1 / -1;">
            <label>YouTube Link (optional):</label>
            <input type="text" name="youtube_url" placeholder="https://youtube.com/..." style="width: 100%; margin-bottom: 10px;">
        </div>

        <button type="submit" class="save-btn">Save Entry</button>
    </form>
</div>

{% endblock %}
